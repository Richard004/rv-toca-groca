<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FF8FAB">
  <title>Toca Groca — Our Family World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <!-- Splash Screen -->
    <div id="splash" class="screen active">
      <div class="splash-content">
        <div class="logo-bounce">
          <h1 class="logo-title">Toca Groca</h1>
          <p class="logo-sub">Our Family World</p>
        </div>
        <div class="splash-characters" id="splash-chars"></div>
        <p class="splash-tagline">Play, explore &amp; create stories with our whole family!</p>
        <button class="btn-play" id="btn-play">
          <span class="btn-play-icon">▶</span>
          Let's Play!
        </button>
        <p class="splash-credit">Made with ❤️ by Tata Richard for Klarka, Anetka, Tanicka &amp; Risa</p>
      </div>
      <div class="splash-sparkles"></div>
    </div>

    <!-- Main Game -->
    <div id="game" class="screen">
      <!-- Top Bar -->
      <header class="top-bar">
        <button class="icon-btn" id="btn-home" title="Home screen">🏠</button>
        <h2 class="room-title" id="room-title">Living Room</h2>
        <div class="top-actions">
          <button class="icon-btn" id="btn-characters" title="Family &amp; pets">👨‍👩‍👧‍👦</button>
          <button class="icon-btn" id="btn-items" title="Items &amp; toys">🎁</button>
          <button class="icon-btn" id="btn-save" title="Save backup">💾</button>
          <button class="icon-btn" id="btn-load" title="Load backup">📂</button>
        </div>
      </header>

      <!-- Room Navigation -->
      <nav class="room-nav" id="room-nav"></nav>

      <!-- Game World -->
      <main class="game-world" id="game-world">
        <div class="room-scene" id="room-scene"></div>
        <div class="entities-layer" id="entities-layer"></div>
      </main>

      <!-- Character Drawer -->
      <aside class="drawer" id="char-drawer">
        <div class="drawer-header">
          <h3>Our Family &amp; Pets</h3>
          <button class="drawer-close" data-close="char-drawer">✕</button>
        </div>
        <div class="drawer-content" id="char-list"></div>
      </aside>

      <!-- Items Drawer -->
      <aside class="drawer" id="items-drawer">
        <div class="drawer-header">
          <h3>Items &amp; Toys</h3>
          <button class="drawer-close" data-close="items-drawer">✕</button>
        </div>
        <div class="drawer-content" id="items-list"></div>
      </aside>

      <!-- Hint -->
      <p class="game-hint">Přetáhni postavy • Klepni 2× = jde domů • Klepni na nábytek = interakce</p>

      <!-- Toast -->
      <div class="toast" id="toast"></div>

      <!-- Hidden file input for restore -->
      <input type="file" id="file-input" accept=".json,.zip" hidden>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
